<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code - Soirée Parrainage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 30px 0;
            padding: 20px;
            background-color: #fafafa;
            border-radius: 8px;
            border: 2px dashed #dcdcdc;
        }

        .url-display {
            background-color: #f0f0f0;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
            color: #5d6d7e;
            border-left: 4px solid #5d6d7e;
        }

        .instructions {
            margin-top: 25px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            text-align: left;
        }

        .instructions h3 {
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .instructions ul {
            list-style: none;
            padding-left: 0;
        }

        .instructions li {
            color: #555;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .instructions li:before {
            content: "📱";
            position: absolute;
            left: 0;
        }

        .instructions li:nth-child(2):before {
            content: "📷";
        }

        .instructions li:nth-child(3):before {
            content: "✅";
        }

        .date-info {
            margin-top: 25px;
            padding: 15px;
            background-color: #5d6d7e;
            color: white;
            border-radius: 6px;
            font-weight: 600;
        }

        .download-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #5d6d7e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #4a5a6b;
        }

        @media print {
            body {
                background: white;
            }
            .container {
                box-shadow: none;
            }
            .download-btn {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Soirée Parrainage</h1>
    <p class="subtitle">Scannez pour vous inscrire</p>
    
    <div id="qrcode"></div>
    
    <div class="url-display" id="urlText">
        https://votre-site.com/formulaire.html
    </div>

    <div class="instructions">
        <h3>📋 Comment utiliser ce QR Code :</h3>
        <ul>
            <li>Ouvrez l'appareil photo de votre téléphone</li>
            <li>Pointez vers le QR code ci-dessus</li>
            <li>Cliquez sur le lien qui apparaît</li>
        </ul>
    </div>

    <div class="date-info">
        📅 17 mars 2026 | 17h - 21h
    </div>

    <button class="download-btn" onclick="downloadQR()">📥 Télécharger le QR Code</button>
</div>

<script>
    // ⚠️ REMPLACE CETTE URL PAR L'URL DE TON FORMULAIRE
    const formulaireURL = "https://votre-site.com/formulaire.html";
    
    // Génération du QR code
    const qrcode = new QRCode(document.getElementById("qrcode"), {
        text: formulaireURL,
        width: 200,
        height: 200,
        colorDark: "#2c3e50",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    // Affichage de l'URL
    document.getElementById("urlText").textContent = formulaireURL;

    // Fonction pour télécharger le QR code
    function downloadQR() {
        const canvas = document.querySelector("#qrcode canvas");
        if (canvas) {
            const link = document.createElement("a");
            link.download = "QR-Code-Parrainage.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    }
</script>

</body>
</html>
