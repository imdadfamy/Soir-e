<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soirée Parrainage - 13 Mars 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .date {
            color: #5d6d7e;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            padding: 18px 30px;
            background-color: #5d6d7e;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #4a5a6b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: #5d6d7e;
            border: 2px solid #5d6d7e;
        }

        .btn-secondary:hover {
            background-color: #5d6d7e;
            color: white;
        }

        .icon {
            font-size: 24px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Soirée Parrainage</h1>
    <p class="date">13 Mars 2026 | 17h - 21h</p>
    
    <div class="buttons">
        <a href="formulaire.html" class="btn">
            <span class="icon">📝</span> Remplir le formulaire
        </a>
        
        <a href="qrcode.html" class="btn btn-secondary">
            <span class="icon">📱</span> Voir le QR Code
        </a>
    </div>
</div>

</body>
</html>
